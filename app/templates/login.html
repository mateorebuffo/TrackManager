<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — Track Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #0f172a;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99,102,241,.25) 0%, transparent 70%);
    }
    .auth-wrap {
      width: 100%;
      max-width: 360px;
      padding: 1rem;
    }
    .auth-brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-brand-icon {
      width: 48px; height: 48px;
      background: #6366f1;
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      margin-bottom: 0.9rem;
      box-shadow: 0 8px 24px rgba(99,102,241,.35);
    }
    .auth-brand-name {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.2px;
    }
    .auth-brand-sub {
      display: block;
      font-size: 0.78rem;
      color: rgba(255,255,255,.38);
      margin-top: 0.15rem;
    }
    .auth-card {
      background: #1e293b;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 24px 48px rgba(0,0,0,.35);
    }
    .auth-card h5 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 1.5rem;
    }
    .auth-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,255,255,.55);
      margin-bottom: 0.35rem;
      letter-spacing: 0.02em;
    }
    .auth-input {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      padding: 0.55rem 0.85rem;
      font-size: 0.9rem;
      color: #fff;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .auth-input::placeholder { color: rgba(255,255,255,.2); }
    .auth-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.2);
    }
    .auth-btn {
      width: 100%;
      background: #6366f1;
      border: none;
      border-radius: 8px;
      padding: 0.6rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
      margin-top: 0.25rem;
    }
    .auth-btn:hover { background: #4f46e5; box-shadow: 0 4px 12px rgba(99,102,241,.35); }
    .auth-error {
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.82rem;
      padding: 0.55rem 0.85rem;
      margin-bottom: 1.25rem;
    }
    .mb-form { margin-bottom: 1rem; }
    .mb-form-lg { margin-bottom: 1.5rem; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-brand">
    <div class="auth-brand-icon">♪</div>
    <span class="auth-brand-name">Track Manager</span>
    <span class="auth-brand-sub">Tu flujo de trabajo musical, en un solo lugar.</span>
  </div>
  <div class="auth-card">
    <h5>Iniciar sesión</h5>
    {% if error %}
      <div class="auth-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="mb-form">
        <label class="auth-label">Usuario</label>
        <input type="text" name="username" class="auth-input" autofocus autocomplete="username" required>
      </div>
      <div class="mb-form-lg">
        <label class="auth-label">Contraseña</label>
        <input type="password" name="password" class="auth-input" autocomplete="current-password" required>
      </div>
      <button type="submit" class="auth-btn">Entrar</button>
    </form>
  </div>
</div>
</body>
</html>
