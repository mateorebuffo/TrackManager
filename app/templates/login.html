<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Music Collector</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 380px; }
    .brand { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div class="brand">🎵 Music Collector</div>
    <div class="text-muted small mt-1">Para DJs</div>
  </div>
  <div class="card shadow">
    <div class="card-body p-4">
      <h5 class="card-title mb-4">Iniciar sesión</h5>
      {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/login">
        <input type="hidden" name="next" value="{{ next }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario</label>
          <input type="text" name="username" class="form-control" autofocus autocomplete="username" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <input type="password" name="password" class="form-control" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Entrar</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
