<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configuración inicial — Music Collector</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .setup-card { width: 100%; max-width: 420px; }
    .brand { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; color: #212529; }
  </style>
</head>
<body>
<div class="setup-card">
  <div class="text-center mb-4">
    <div class="brand">🎵 Music Collector</div>
    <div class="text-muted small mt-1">Primera configuración</div>
  </div>
  <div class="card shadow">
    <div class="card-body p-4">
      <h5 class="card-title mb-1">Crear cuenta de administrador</h5>
      <p class="text-muted small mb-4">No hay usuarios registrados. Creá el primer admin para comenzar.</p>
      {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/setup">
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario</label>
          <input type="text" name="username" class="form-control" autofocus required autocomplete="username">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Contraseña</label>
          <input type="password" name="password" class="form-control" required autocomplete="new-password">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Repetir contraseña</label>
          <input type="password" name="password2" class="form-control" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary w-100">Crear administrador</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
